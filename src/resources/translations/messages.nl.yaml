  command_items_update: "Updates a Jira issue's fields. Use -m/--summary, -d/--description, --description-format (plain|markdown), -F/--fields for arbitrary fields. At least one field must be provided."
  command_items_search: Zoek issues met JQL.
  command_items_transition: Zet een Jira werkitem over naar een andere status. Als sleutel niet wordt opgegeven, wordt geprobeerd te detecteren vanuit huidige branch.
  command_filters_list: Lijst alle beschikbare Jira-filters.
  command_filters_show: Haal issues op uit een opgeslagen Jira filter.
  command_items_start: Maakt een nieuwe git tak van een Jira item.
  command_items_takeover: Takes over an issue from another user. Assigns the issue to you and switches to existing branch if found, or starts fresh if no branch exists.
  command_branch_rename: Renames a branch. Can regenerate name from Jira issue key or use explicit name with --name option.
  command_commit: Begeleidt u bij het maken van een conventionele commit.
  command_commit_undo: "Verwijdert de laatste commit en houdt wijzigingen unstaged. Waarschuwt of vraagt bevestiging als al gepusht; gebruik 'stud please' om daarna force-push te doen."
  command_push: "Zoals stud commit, daarna HEAD naar origin pushen (zelfde niet-forcerende push als stud submit preflight). Na mislukte push: stud please tenzij uitgeschakeld. CLI: --no-please. Agent-JSON: alleen pleaseFallback (standaard true; false = geen stud please). stud push --agent --no-please = pleaseFallback false."
  command_please: Een veilige force-push voor gevorderde gebruikers (force-with-lease).
  command_flatten: Automatisch alle fixup! commits samenvoegen in hun doelcommits.
  command_cache_clear: Wis de update controle cache om een versiecontrole af te dwingen bij de volgende opdracht.
  command_submit: "Pusht de huidige tak en maakt een Pull Request. Niet-gecommitte lokale wijzigingen blokkeren indienen niet; je krijgt een informatieve melding dat push/PR commits op de branch gebruiken. Agent-JSON: optioneel stageAll — bij true eerst stud push (optioneel isNew, message, pleaseFallback; zoals stud push --agent)."
  command_pr_comment: Plaatst een opmerking op de actieve Pull Request. Ondersteunt piping vanuit STDIN of een direct argument.
  command_pr_comments: Haalt issue- en beoordelingscommentaren op voor de PR/MR van de huidige branch en toont deze. Use --threaded or agent JSON threaded=true for grouped conversations with action metadata.
  command_status: Een snelle "waar ben ik?" dashboard.
  command_release: Maakt een nieuwe release tak en verhoogt de versie.
  command_deploy: Deployt de huidige release tak.
  command_update: Controleert op en installeert nieuwe versies van de tool.
  universal_help_note: 'Tip: Gebruik --help (of -h) met elk commando om gedetailleerde help te zien. Bijvoorbeeld: stud commit --help'
  command_specific_help_note: 'Tip: Voer ''stud help <commando>'' uit om gedetailleerde help voor een specifiek commando te zien. Bijvoorbeeld: stud help commit'
