  option_pr_comments_threaded: "Show PR/MR feedback as threaded conversations with action identifiers and resolution state"
  option_update_info: Bekijk het changelog van de nieuwste beschikbare versie zonder te downloaden of te installeren. Handig voor het controleren van breaking changes voordat u update
  option_release_major: Verhoog major versie (X.0.0)
