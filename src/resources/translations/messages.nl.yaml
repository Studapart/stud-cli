  option_confluence_push_page: "Existing page ID to update (omit to create)"
  option_confluence_push_parent: "Parent page ID for nesting (create only)"
  option_confluence_push_url: "Override Confluence base URL"
  option_confluence_push_status: "Page status: current (default) or draft"
  option_confluence_push_contact_email: "Add a 'Contact: @User' block at the bottom (user resolved by email via Jira)"
  command_confluence_show: "Fetch and display a Confluence page by ID or URL. Use -p/--page (page ID) or --url (page URL); at least one required. Body is returned as markdown. Supports agent mode with JSON input (pageId, url) and output (id, title, url, body)."
  option_confluence_show_page: "Confluence page ID"
  option_confluence_show_url: "Confluence page URL (e.g. .../wiki/spaces/SPACE/pages/123456)"
  command_confluence_page_labels: "Add labels to a Confluence page. Use -p/--page and -l/--labels (comma-separated)."
