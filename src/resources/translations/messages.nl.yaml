  command_items_upload: "Uploadt één of meer lokale bestanden als Jira-bijlagen (REST multipart). Paden relatief aan cwd; bovenliggende segmenten (..) worden geweigerd. Zelfde Jira-auth. Agent JSON: key (verplicht), files (array van paden). Optioneel inputFile met --agent (zoals items:update). Geen --quiet; gebruik --agent voor automatisering."
