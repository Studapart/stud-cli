  option_items_upload_file: "Lokaal bestandspad relatief aan cwd; herhaal -f/--file voor meerdere bestanden"
  option_commit_new: Maak een nieuwe logische commit in plaats van een fixup
  option_commit_message: Omzeil de interactieve prompt en gebruik het opgegeven bericht voor de commit
  option_commit_all: Stage alle wijzigingen voordat u commit (herstelt het oude gedrag)
  option_push_no_please: "Na een mislukte normale push stud please niet uitvoeren of aanbieden"
  option_submit_draft: Maak een Draft Pull Request (gemarkeerd als "Draft" op GitHub)
  option_submit_labels: Komma-gescheiden lijst van labels om toe te passen op de Pull Request. Als een label niet bestaat, wordt u gevraagd deze te maken, te negeren of opnieuw te proberen met een gecorrigeerde lijst
  option_submit_assign_to_author: "Assign the created Pull Request or Merge Request to the authenticated provider user"
