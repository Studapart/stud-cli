help:
  title: Manual
  description_section: DESCRIPCIÓN
  description_text: '`stud-cli` es una herramienta de interfaz de línea de comandos diseñada para optimizar el flujo de trabajo diario de un desarrollador integrando estrechamente los elementos de trabajo de Jira con las operaciones del repositorio Git local. Le guía a través del "camino dorado" de iniciar una tarea, hacer commits convencionales y preparar su trabajo para su envío, todo desde la línea de comandos.'
  global_options_section: OPCIONES GLOBALES
  commands_section: COMANDOS
  global_option_help: Mostrar ayuda para el comando dado. Cuando no se da ningún comando, mostrar ayuda para el comando list.
  global_option_silent: No mostrar ningún mensaje.
  global_option_quiet: Solo se muestran errores. Todas las demás salidas se suprimen.
  global_option_verbose: 'Aumentar la verbosidad de los mensajes: 1 para salida normal, 2 para salida más verbosa y 3 para debug.'
  category_configuration: Configuración
  category_jira_information: Información de Jira
  category_git_workflow: Flujo de trabajo Git
  category_release_commands: Comandos de Release
  example_prefix: 'Ejemplo: %example%'
  command_config_init: Asistente interactivo para configurar los detalles de conexión de Jira y Git.
  command_config_show: "Mostrar la configuración actual (global y proyecto) con secretos ocultos; seguro para compartir."
  command_config_validate: "Validar que la configuración está presente y que Jira y el proveedor Git son accesibles. Use --skip-jira o --skip-git para comprobaciones parciales."
  command_completion: Genera scripts de auto-completado para bash o zsh.
  command_projects_list: Lista todos los proyectos de Jira visibles.
  command_items_list: Lista elementos de trabajo activos (su panel de control).
  command_items_create: Creates a Jira issue. Use -p/--project, -t/--type (default Story), -m/--summary, -d/--description. Default project from JIRA_DEFAULT_PROJECT in .git/stud.config. Description STDIN then -d. Custom required fields require interactive run.
  command_items_show: Muestra información detallada para un elemento de trabajo.
  command_items_search: Buscar issues usando JQL.
  command_items_transition: Transita un ticket Jira a un estado diferente. Si no se proporciona la clave, intenta detectarla desde la rama actual.
  command_filters_list: Lista todos los filtros de Jira disponibles.
  command_filters_show: Obtener issues de un filtro de Jira guardado.
  command_items_start: Crea una nueva rama git desde un elemento de Jira.
  command_items_takeover: Takes over an issue from another user. Assigns the issue to you and switches to existing branch if found, or starts fresh if no branch exists.
  command_branch_rename: Renames a branch. Can regenerate name from Jira issue key or use explicit name with --name option.
  command_commit: Le guía a través de la creación de un commit convencional.
  command_commit_undo: "Elimina el último commit y deja los cambios sin preparar. Avisa o pide confirmación si ya está pusheado; use 'stud please' para force-push después."
  command_please: Un force-push seguro para usuario avanzado (force-with-lease).
  command_flatten: Fusionar automáticamente todos los commits fixup! en sus commits objetivo.
  command_cache_clear: Limpiar el caché de verificación de actualización para forzar una verificación de versión en el próximo comando.
  command_submit: Envía la rama actual y crea una Pull Request.
  command_pr_comment: Publica un comentario en la Pull Request activa. Admite piping desde STDIN o un argumento directo.
  command_pr_comments: Obtiene y muestra los comentarios (issue y revisión) de la PR/MR de la rama actual.
  command_status: Un panel de control rápido "¿dónde estoy?".
  command_release: Crea una nueva rama de release y aumenta la versión.
  command_deploy: Despliega la rama de release actual.
  command_update: Verifica e instala nuevas versiones de la herramienta.
  universal_help_note: 'Consejo: Use --help (o -h) con cualquier comando para ver ayuda detallada. Por ejemplo: stud commit --help'
  command_specific_help_note: 'Consejo: Ejecute ''stud help <comando>'' para ver ayuda detallada para un comando específico. Por ejemplo: stud help commit'
  command_help_title: 'Ayuda: %command%'
  see_readme_note: Para más información, consulte la documentación completa en README.md
  command_not_found: 'Texto de ayuda no disponible para el comando: %command%'
  option_all: Listar elementos para todos los usuarios (anula el filtro de asignado por defecto)
  option_project: Filtrar elementos por una clave de proyecto específica (por ej., PROJ)
  option_items_list_sort: Ordenar resultados por Key o Status (use --sort o -s)
  option_commit_new: Crear un nuevo commit lógico en lugar de un fixup
  option_commit_message: Omitir el prompt interactivo y usar el mensaje proporcionado para el commit
  option_commit_all: Preparar todos los cambios antes de hacer commit (restaura el comportamiento anterior)
  option_submit_draft: Crear una Pull Request en borrador (marcada como "Draft" en GitHub)
  option_submit_labels: Lista separada por comas de etiquetas para aplicar a la Pull Request. Si una etiqueta no existe, se le pedirá que la cree, la ignore o reintente con una lista corregida
  option_update_info: Vista previa del changelog de la última versión disponible sin descargar o instalar. Útil para verificar cambios importantes antes de actualizar
  option_release_major: Incrementar versión mayor (X.0.0)
  option_release_minor: Incrementar versión menor (X.Y.0)
  option_release_patch: Incrementar versión de parche (X.Y.Z). Este es el valor por defecto si no se proporcionan banderas
  option_release_publish: Publicar la rama de release en el repositorio remoto
  option_branch_rename_name: Explicit new branch name (no prefix will be added). This option takes precedence over the key argument
  command_branches_list: Lista ramas locales/remotas con estado (fusionado, obsoleto, PR activa)
  command_branches_clean: Limpieza interactiva de ramas fusionadas/obsoletas
  option_items_create_project: Jira project key (or set JIRA_DEFAULT_PROJECT in .git/stud.config)
  option_items_create_type: Issue type (default Story)
  option_items_create_summary: Issue summary/title
  option_items_create_description: Issue description (STDIN takes precedence when piping)
  option_items_create_description_format: "Description format: plain (default) or markdown (converts to Jira ADF)"
  option_items_create_parent: Parent issue key for creating a sub-task
  option_items_create_assignee: "Assignee account ID (default: current user when field is required)"
  option_items_create_labels: "Comma-separated labels (only set when project/issue type supports labels)"
  option_items_create_original_estimate: "Original time estimate: 1d, 0.5d, 1 day, 2h, 30m (converted to seconds for Jira)"
  option_config_show_key: "Show only this config key (whitelisted non-secret keys only)"
  option_config_show_quiet: "With --key: output only the raw value; ignored without --key"
  option_config_validate_skip_jira: "Skip the Jira connectivity check"
  option_config_validate_skip_git: "Skip the Git provider connectivity check"
  option_quiet: "No interactivo: usar valores por defecto, sin preguntas"
  option_branches_clean_quiet: Eliminar todas las ramas coincidentes sin preguntar
  option_deploy_clean: Limpiar ramas fusionadas después del despliegue
