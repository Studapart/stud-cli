help:
  title: Manuel
  description_section: DESCRIPTION
  description_text: '`stud-cli` est un outil d''interface en ligne de commande conçu pour rationaliser le flux de travail quotidien d''un développeur en intégrant étroitement les éléments de travail Jira avec les opérations du dépôt Git local. Il vous guide à travers le "chemin d''or" de démarrage d''une tâche, de création de commits conventionnels et de préparation de votre travail pour la soumission, le tout depuis la ligne de commande.'
  global_options_section: OPTIONS GLOBALES
  commands_section: COMMANDES
  global_option_help: Afficher l'aide pour la commande donnée. Lorsqu'aucune commande n'est donnée, afficher l'aide pour la commande list.
  global_option_silent: Ne pas afficher de message.
  global_option_quiet: Seules les erreurs sont affichées. Toutes les autres sorties sont supprimées.
  global_option_verbose: 'Augmenter la verbosité des messages : 1 pour la sortie normale, 2 pour une sortie plus verbeuse et 3 pour le debug.'
  category_configuration: Configuration
  category_jira_information: Informations Jira
  category_confluence: "Confluence"
  category_git_workflow: Flux de travail Git
  category_release_commands: Commandes de Release
  example_prefix: 'Exemple : %example%'
  command_config_init: Assistant interactif pour les fournisseurs Git, les fournisseurs de tickets (Jira/Linear) et les identifiants.
  command_config_show: "Afficher la configuration actuelle (globale et projet) avec les secrets masqués ; sûr à partager."
  command_config_validate: "Valider que la configuration est présente et que Jira, le fournisseur Git et Linear sont accessibles. Utilisez --skip-jira, --skip-git ou --skip-linear pour des vérifications partielles."
  command_config_project_init: "Crée ou fusionne .git/stud.config (clé de projet, branche de base, fournisseur, jetons, JIRA_DEFAULT_PROJECT, CONFLUENCE_DEFAULT_SPACE). Exécutez en mode interactif ou utilisez stud config:project-init --agent avec du JSON. Les clés agent inconnues sont rejetées ; migration_version est réservée."
  command_completion: Génère des scripts d'auto-complétion pour bash ou zsh.
  command_docs_generate: Generate the exhaustive command reference from runtime command metadata.
  command_docs_check: Check that the generated command reference is up to date.
  command_help: Displays a list of available commands.
  command_projects_list: Liste tous les projets Jira visibles.
  command_projects_workflow: Liste les transitions de workflow (Jira) ou les états (Linear) pour un projet.
  option_projects_workflow_project: Clé de projet ou d'équipe (ex. SCI)
  command_projects_labels: Liste les LabelGroups Linear et les étiquettes enfants pour une équipe projet.
  option_projects_labels_project: Clé de projet ou d'équipe (ex. SCI)
  option_projects_labels_groups_only: Retourner uniquement les LabelGroups ; exclure les étiquettes orphelines hors groupe
  command_items_list: Liste les éléments de travail actifs (votre tableau de bord).
  command_items_show: Affiche des informations détaillées pour un élément de travail.
  command_items_download: "Télécharge les pièces jointes Jira pour un ticket ou un fichier depuis une URL de pièce jointe. Avec une clé, toutes les pièces sont enregistrées (--url ignoré). Sans clé, --url est obligatoire. Même authentification Jira que les autres commandes. Dossier par défaut : .cursor/stud-downloads. Agent JSON : issueKey ou key, url et path optionnels."
  command_items_upload: "Envoie un ou plusieurs fichiers locaux comme pièces jointes Jira (REST multipart). Chemins relatifs au cwd ; les segments (..) sont refusés. Même authentification Jira. Agent JSON : key (requis), files (tableau de chemins). inputFile optionnel avec --agent (comme items:update). Pas de --quiet ; utilisez --agent pour l'automatisation."
  command_items_create: "Crée un ticket Jira. Options -p/--project, -t/--type (défaut Story), -m/--summary, -d/--description, --description-format (plain|markdown), --parent (sous-tâche), -F/--fields pour champs arbitraires. Projet par défaut depuis JIRA_DEFAULT_PROJECT dans .git/stud.config. Description : STDIN puis -d. Champs obligatoires personnalisés : exécuter en mode interactif."
  command_items_update: "Updates a Jira issue's fields. Use -m/--summary, -d/--description, --description-format (plain|markdown), -F/--fields for arbitrary fields. At least one field must be provided."
  command_items_search: Rechercher des issues avec JQL.
  command_items_transition: Fait passer un ticket Jira à un autre statut. Si la clé n'est pas fournie, tente de la détecter depuis la branche actuelle.
  command_filters_list: Liste tous les filtres Jira disponibles.
  command_filters_show: Récupérer les issues depuis un filtre Jira enregistré.
  command_items_start: Crée une nouvelle branche git à partir d'un élément Jira.
  command_items_takeover: Takes over an issue from another user. Assigns the issue to you and switches to existing branch if found, or starts fresh if no branch exists.
  command_branch_rename: Renames a branch. Can regenerate name from Jira issue key or use explicit name with --name option.
  command_commit: Vous guide à travers la création d'un commit conventionnel.
  command_commit_undo: "Supprime le dernier commit et garde les modifications non indexées. Refuse ou demande confirmation si le dernier commit est déjà poussé ; utilisez 'stud please' pour force-push après annulation."
  command_push: "Comme stud commit, puis pousse HEAD vers origin (même push non forcé que la pré-vérification de stud submit). Après un push échoué, exécute ou propose stud please sauf si désactivé. CLI : --no-please. JSON agent : uniquement pleaseFallback (défaut true ; false = pas de stud please). stud push --agent --no-please équivaut à pleaseFallback false."
  command_please: Un force-push sûr pour utilisateur avancé (force-with-lease).
  command_flatten: Fusionner automatiquement tous les commits fixup! dans leurs commits cibles.
  command_cache_clear: Effacer le cache de vérification de mise à jour pour forcer une vérification de version à la prochaine commande.
  command_submit: "Pousse la branche actuelle et crée une Pull Request. Les modifications locales non commitées ne bloquent pas la soumission ; un message indique que le push et la PR utilisent les commits sur la branche. JSON agent : stageAll optionnel — si true, exécute stud push d'abord (isNew, message, pleaseFallback optionnels ; comme stud push --agent)."
  command_pr_comment: Publie un commentaire sur la Pull Request active. Prend en charge le piping depuis STDIN ou un argument direct.
